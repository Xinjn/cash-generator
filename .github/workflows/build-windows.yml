name: Build Windows Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (optional)'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm CashCouponGenerator_win.spec

      - name: Create portable zip
        run: |
          Compress-Archive -Path dist\CashGenerator -DestinationPath dist\CashGenerator_Windows_Portable.zip

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        run: |
          makensis installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/CashGenerator_Windows_Portable.zip
            dist/CashGenerator_Setup.exe

      - name: Create Release
        if: github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            dist/CashGenerator_Windows_Portable.zip
            dist/CashGenerator_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
